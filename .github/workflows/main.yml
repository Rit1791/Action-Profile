name: Build WF
on:
  # push:
  #   branches:
  #     - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
  
      - name: Code checkout 
        uses: actions/checkout@v3

      - name: Maven Build
        run: mvn install  
  Testing:
    runs-on: ubuntu-latest
    steps:
  
      - name: Code checkout 
        uses: actions/checkout@v3

      - name: Run Tests on main branch 
        run: mvn test

      - name: Checkstyle
        run: mvn checkstyle:checkstyle